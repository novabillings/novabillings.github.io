  - title: "A Seussified Christmas Carol"
    playwright: "Peter Bloedel"
    director: "Dakota Hunter"
    description: "A whimsical reinvention of Dickens' most beloved Christmas story in wacky rhymed couplets. With zoot fruited juices and binka bird geese, from Bed-Headed Fred to Timmy Loo Hoo, this tale of glorious holiday cheer is similar to something Dr. Seuss might have come up with -- if he ever had his way with the story."
    dates: "December 4-14, 2025"
    showtimes:
